# Keep-alive для Supabase проекта tournament-checkin
# Файл: .github/workflows/keep-alive.yml в репозитории checkin
#
# Требуются секреты репозитория (Settings -> Secrets and variables -> Actions):
#   SUPABASE_URL      = https://jdfupjkrckqqttsymwhr.supabase.co
#   SUPABASE_ANON_KEY = анонимный ключ (Dashboard -> Settings -> API -> anon public)

name: Supabase keep-alive

on:
  schedule:
    # Дважды в день (UTC): 03:17 и 15:17. Минута не 0, чтобы не попадать
    # в пиковую нагрузку GitHub, когда cron чаще пропускается.
    - cron: '17 3 * * *'
    - cron: '17 15 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Upsert keep-alive row
        run: |
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          curl --fail -sS -X POST \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive?on_conflict=id" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d "{\"id\": 1, \"pinged_at\": \"${NOW}\"}"
          echo "OK: ping at ${NOW}"
